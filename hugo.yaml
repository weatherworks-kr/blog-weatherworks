baseURL: "https://blog-weatherworks.pages.dev/"
languageCode: "ko"
title: "WeatherWorks 블로그"
theme: "PaperMod"

defaultContentLanguage: "ko"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: "WeatherWorks 블로그"
  description: "기후변화 대응 웨더 기어 브랜드 WeatherWorks의 공식 블로그. 자외선 차단, UV 과학, 기후변화 패션 정보를 전달합니다."
  keywords: ["자외선 차단", "양산", "UV 차단", "웨더 기어", "기후변화 패션", "WeatherWorks"]
  author: "WeatherWorks"
  images: ["/images/og-default.jpg"]
  DateFormat: "2006년 1월 2일"

  defaultTheme: light
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false

  homeInfoParams:
    Title: "☀️ WeatherWorks 블로그"
    Content: >
      기후변화 시대, 자외선으로부터 당신을 지키는 웨더 기어 브랜드.
      UV 차단 과학, 양산 가이드, 기후변화 패션 트렌드를 전합니다.

  socialIcons:
    - name: website
      url: "https://weatherworks.kr"
    - name: rss
      url: "/index.xml"

  analytics:
    google:
      SiteVerificationTag: "3Zhr9tLHzqklHs6d8LD-NYkyT3jkiRuubC34pUT72iE"  # Google Search Console 인증 후 추가

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: search
      name: "🔍 검색"
      url: /search/
      weight: 1
    - identifier: categories
      name: "📂 카테고리"
      url: /categories/
      weight: 2
    - identifier: tags
      name: "🏷️ 태그"
      url: /tags/
      weight: 3
    - identifier: shop
      name: "🛒 쇼핑몰"
      url: "https://weatherworks.kr"
      weight: 4

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

sitemap:
  changeFreq: "weekly"
  filename: "sitemap.xml"
  priority: 0.5

taxonomies:
  category: categories
  tag: tags
